name: Build & Release

# Se déclenche quand on pousse un tag du type v1.0.0, v2.3.1, etc.
# Ou manuellement depuis l'onglet Actions de GitHub (sans saisie requise)
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write  # nécessaire pour créer la release GitHub

jobs:
  # ─── Calcul de la version ──────────────────────────────────────
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - name: Calculer la version
        id: version
        run: |
          if [[ "${{ github.ref_name }}" == v*.*.* ]]; then
            echo "value=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "value=v$(date +'%Y.%m.%d')-${{ github.run_number }}" >> $GITHUB_OUTPUT
          fi
  # ─── Build Linux ───────────────────────────────────────────────
  build-linux:
    needs: prepare
    runs-on: ubuntu-20.04
    env:
      RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Installer Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dépendances système (Qt / XCB)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libglib2.0-0 libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-xinerama0 \
            libxcb-xfixes0 libxcb-shape0 libxcb-cursor0 libdbus-1-3 \
            libgl1 libegl1

      - name: Installer les dépendances Python
        run: pip install -r requirements.txt -r requirements-build.txt

      - name: Build PyInstaller (Linux)
        run: |
          python -m PyInstaller \
            --noconfirm \
            --clean \
            --windowed \
            --onefile \
            --name duplicate-finder \
            --hidden-import openpyxl \
            --hidden-import xlrd \
            --hidden-import odf \
            --hidden-import pandas \
            src/main.py

      - name: Préparer le tar.gz Linux x86_64
        run: |
          mkdir -p release-linux-x86_64/data release-linux-x86_64/output
          cp dist/duplicate-finder release-linux-x86_64/
          cp -r data/. release-linux-x86_64/data/
          cp output/.gitkeep release-linux-x86_64/output/.gitkeep
          chmod +x release-linux-x86_64/duplicate-finder
          tar -czf duplicate-finder-linux-x86_64-${{ env.RELEASE_VERSION }}.tar.gz -C release-linux-x86_64 .

      - name: Upload artifact Linux x86_64
        uses: actions/upload-artifact@v4
        with:
          name: duplicate-finder-linux-x86_64
          path: duplicate-finder-linux-x86_64-${{ env.RELEASE_VERSION }}.tar.gz

  # ─── Build Linux ARM64 ───────────────────────────────────────────
  build-linux-arm64:
    needs: prepare
    runs-on: ubuntu-22.04-arm
    env:
      RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Installer Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dépendances système (Qt / XCB)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libglib2.0-0 libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-xinerama0 \
            libxcb-xfixes0 libxcb-shape0 libxcb-cursor0 libdbus-1-3 \
            libgl1 libegl1

      - name: Installer les dépendances Python
        run: pip install -r requirements.txt -r requirements-build.txt

      - name: Build PyInstaller (Linux ARM64)
        run: |
          python -m PyInstaller \
            --noconfirm \
            --clean \
            --windowed \
            --onefile \
            --name duplicate-finder \
            --hidden-import openpyxl \
            --hidden-import xlrd \
            --hidden-import odf \
            --hidden-import pandas \
            src/main.py

      - name: Préparer le tar.gz Linux ARM64
        run: |
          mkdir -p release-linux-arm64/data release-linux-arm64/output
          cp dist/duplicate-finder release-linux-arm64/
          cp -r data/. release-linux-arm64/data/
          cp output/.gitkeep release-linux-arm64/output/.gitkeep
          chmod +x release-linux-arm64/duplicate-finder
          tar -czf duplicate-finder-linux-arm64-${{ env.RELEASE_VERSION }}.tar.gz -C release-linux-arm64 .
          # Compatible : Raspberry Pi 4/5 (OS 64-bit), Ubuntu/Debian ARM64, serveurs AWS Graviton, etc.

      - name: Upload artifact Linux ARM64
        uses: actions/upload-artifact@v4
        with:
          name: duplicate-finder-linux-arm64
          path: duplicate-finder-linux-arm64-${{ env.RELEASE_VERSION }}.tar.gz

  # ─── Build macOS ───────────────────────────────────────────────
  build-macos:
    needs: prepare
    runs-on: macos-latest
    env:
      RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Installer Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dépendances Python
        run: pip install -r requirements.txt -r requirements-build.txt

      - name: Build PyInstaller (macOS universal — Intel + Apple Silicon)
        run: |
          python -m PyInstaller \
            --noconfirm \
            --clean \
            --windowed \
            --onefile \
            --target-arch universal2 \
            --name duplicate-finder \
            --hidden-import openpyxl \
            --hidden-import xlrd \
            --hidden-import odf \
            --hidden-import pandas \
            src/main.py

      - name: Préparer le tar.gz macOS universal
        run: |
          mkdir -p release-macos/data release-macos/output
          # Prendre le .app si présent, sinon l'exécutable
          if [ -d "dist/duplicate-finder.app" ]; then
            cp -r dist/duplicate-finder.app release-macos/
          else
            cp dist/duplicate-finder release-macos/
            chmod +x release-macos/duplicate-finder
          fi
          cp -r data/. release-macos/data/
          cp output/.gitkeep release-macos/output/.gitkeep
          tar -czf duplicate-finder-macos-universal-${{ env.RELEASE_VERSION }}.tar.gz -C release-macos .
          # Compatible : macOS 11+ Intel (x86_64) ET Apple Silicon (M1/M2/M3/M4)

      - name: Upload artifact macOS universal
        uses: actions/upload-artifact@v4
        with:
          name: duplicate-finder-macos-universal
          path: duplicate-finder-macos-universal-${{ env.RELEASE_VERSION }}.tar.gz

  # ─── Build Windows ─────────────────────────────────────────────
  build-windows:
    needs: prepare
    runs-on: windows-latest
    env:
      RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Installer Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dépendances Python
        run: pip install -r requirements.txt -r requirements-build.txt

      - name: Build PyInstaller (Windows)
        run: |
          python -m PyInstaller `
            --noconfirm `
            --clean `
            --windowed `
            --onefile `
            --name duplicate-finder `
            --hidden-import openpyxl `
            --hidden-import xlrd `
            --hidden-import odf `
            --hidden-import pandas `
            src/main.py

      - name: Préparer le zip Windows
        run: |
          New-Item -ItemType Directory -Force -Path release-windows\data, release-windows\output | Out-Null
          Copy-Item dist\duplicate-finder.exe release-windows\
          Copy-Item data\* release-windows\data\ -Recurse
          Copy-Item output\.gitkeep release-windows\output\.gitkeep
          Compress-Archive -Path release-windows\* -DestinationPath duplicate-finder-windows-x86_64-${{ env.RELEASE_VERSION }}.zip
          # Compatible : Windows 8 / 8.1 / 10 / 11 (64-bit). Pas Windows 7 ni 32-bit.

      - name: Upload artifact Windows x86_64
        uses: actions/upload-artifact@v4
        with:
          name: duplicate-finder-windows-x86_64
          path: duplicate-finder-windows-x86_64-${{ env.RELEASE_VERSION }}.zip

  # ─── Créer la Release GitHub ───────────────────────────────────
  release:
    needs: [prepare, build-linux, build-linux-arm64, build-macos, build-windows]
    runs-on: ubuntu-latest
    env:
      RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - name: Télécharger l'artifact Linux x86_64
        uses: actions/download-artifact@v4
        with:
          name: duplicate-finder-linux-x86_64
          path: artifacts/linux-x86_64

      - name: Télécharger l'artifact Linux ARM64
        uses: actions/download-artifact@v4
        with:
          name: duplicate-finder-linux-arm64
          path: artifacts/linux-arm64

      - name: Télécharger l'artifact macOS universal
        uses: actions/download-artifact@v4
        with:
          name: duplicate-finder-macos-universal
          path: artifacts/macos

      - name: Télécharger l'artifact Windows x86_64
        uses: actions/download-artifact@v4
        with:
          name: duplicate-finder-windows-x86_64
          path: artifacts/windows

      - name: Créer la Release GitHub
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_VERSION }}
          name: "Release ${{ env.RELEASE_VERSION }}"
          target_commitish: ${{ github.sha }}
          draft: false
          prerelease: false
          files: |
            artifacts/linux-x86_64/duplicate-finder-linux-x86_64-${{ env.RELEASE_VERSION }}.tar.gz
            artifacts/linux-arm64/duplicate-finder-linux-arm64-${{ env.RELEASE_VERSION }}.tar.gz
            artifacts/macos/duplicate-finder-macos-universal-${{ env.RELEASE_VERSION }}.tar.gz
            artifacts/windows/duplicate-finder-windows-x86_64-${{ env.RELEASE_VERSION }}.zip
