name: Build & Release

# Se déclenche quand on pousse un tag du type v1.0.0, v2.3.1, etc.
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write  # nécessaire pour créer la release GitHub

jobs:
  # ─── Build Linux ───────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Installer Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dépendances système (Qt / XCB)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libglib2.0-0 libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-xinerama0 \
            libxcb-xfixes0 libxcb-shape0 libxcb-cursor0 libdbus-1-3 \
            libgl1 libegl1

      - name: Installer les dépendances Python
        run: pip install -r requirements.txt -r requirements-build.txt

      - name: Build PyInstaller (Linux)
        run: |
          python -m PyInstaller \
            --noconfirm \
            --clean \
            --windowed \
            --onefile \
            --name duplicate-finder \
            --hidden-import openpyxl \
            --hidden-import xlrd \
            --hidden-import odf \
            --hidden-import pandas \
            src/main.py

      - name: Préparer le zip Linux
        run: |
          mkdir -p release-linux/data release-linux/output
          cp dist/duplicate-finder release-linux/
          cp -r data/. release-linux/data/
          cp output/.gitkeep release-linux/output/.gitkeep
          chmod +x release-linux/duplicate-finder
          cd release-linux && zip -r ../duplicate-finder-linux-${{ github.ref_name }}.zip .

      - name: Upload artifact Linux
        uses: actions/upload-artifact@v4
        with:
          name: duplicate-finder-linux
          path: duplicate-finder-linux-${{ github.ref_name }}.zip

  # ─── Build Windows ─────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Installer Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dépendances Python
        run: pip install -r requirements.txt -r requirements-build.txt

      - name: Build PyInstaller (Windows)
        run: |
          python -m PyInstaller `
            --noconfirm `
            --clean `
            --windowed `
            --onefile `
            --name duplicate-finder `
            --hidden-import openpyxl `
            --hidden-import xlrd `
            --hidden-import odf `
            --hidden-import pandas `
            src/main.py

      - name: Préparer le zip Windows
        run: |
          New-Item -ItemType Directory -Force -Path release-windows\data, release-windows\output | Out-Null
          Copy-Item dist\duplicate-finder.exe release-windows\
          Copy-Item data\* release-windows\data\ -Recurse
          Copy-Item output\.gitkeep release-windows\output\.gitkeep
          Compress-Archive -Path release-windows\* -DestinationPath duplicate-finder-windows-${{ github.ref_name }}.zip

      - name: Upload artifact Windows
        uses: actions/upload-artifact@v4
        with:
          name: duplicate-finder-windows
          path: duplicate-finder-windows-${{ github.ref_name }}.zip

  # ─── Créer la Release GitHub ───────────────────────────────────
  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Télécharger l'artifact Linux
        uses: actions/download-artifact@v4
        with:
          name: duplicate-finder-linux
          path: artifacts/linux

      - name: Télécharger l'artifact Windows
        uses: actions/download-artifact@v4
        with:
          name: duplicate-finder-windows
          path: artifacts/windows

      - name: Rendre le binaire Linux exécutable
        run: chmod +x artifacts/linux/duplicate-finder-linux-${{ github.ref_name }}.zip || true

      - name: Créer la Release GitHub
        uses: softprops/action-gh-release@v2
        with:
          name: "Release ${{ github.ref_name }}"
          draft: false
          prerelease: false
          files: |
            artifacts/linux/duplicate-finder-linux-${{ github.ref_name }}.zip
            artifacts/windows/duplicate-finder-windows-${{ github.ref_name }}.zip
