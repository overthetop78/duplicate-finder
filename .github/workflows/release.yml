name: Build & Release

# Se déclenche quand on pousse un tag du type v1.0.0, v2.3.1, etc.
# Ou manuellement depuis l'onglet Actions de GitHub (sans saisie requise)
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write  # nécessaire pour créer la release GitHub

jobs:
  # ─── Calcul de la version ──────────────────────────────────────
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - name: Calculer la version
        id: version
        run: |
          if [[ "${{ github.ref_name }}" == v*.*.* ]]; then
            echo "value=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "value=v$(date +'%Y.%m.%d')-${{ github.run_number }}" >> $GITHUB_OUTPUT
          fi
  # ─── Build Linux ───────────────────────────────────────────────
  build-linux:
    needs: prepare
    runs-on: ubuntu-latest
    env:
      RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Installer Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dépendances système (Qt / XCB)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libglib2.0-0 libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-xinerama0 \
            libxcb-xfixes0 libxcb-shape0 libxcb-cursor0 libdbus-1-3 \
            libgl1 libegl1

      - name: Installer les dépendances Python
        run: pip install -r requirements.txt -r requirements-build.txt

      - name: Build PyInstaller (Linux)
        run: |
          python -m PyInstaller \
            --noconfirm \
            --clean \
            --windowed \
            --onefile \
            --name duplicate-finder \
            --hidden-import openpyxl \
            --hidden-import xlrd \
            --hidden-import odf \
            --hidden-import pandas \
            src/main.py

      - name: Préparer le tar.gz Linux
        run: |
          mkdir -p release-linux/data release-linux/output
          cp dist/duplicate-finder release-linux/
          cp -r data/. release-linux/data/
          cp output/.gitkeep release-linux/output/.gitkeep
          chmod +x release-linux/duplicate-finder
          tar -czf duplicate-finder-linux-${{ env.RELEASE_VERSION }}.tar.gz -C release-linux .

      - name: Upload artifact Linux
        uses: actions/upload-artifact@v4
        with:
          name: duplicate-finder-linux
          path: duplicate-finder-linux-${{ env.RELEASE_VERSION }}.tar.gz

  # ─── Build Windows ─────────────────────────────────────────────
  build-windows:
    needs: prepare
    runs-on: windows-latest
    env:
      RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Installer Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dépendances Python
        run: pip install -r requirements.txt -r requirements-build.txt

      - name: Build PyInstaller (Windows)
        run: |
          python -m PyInstaller `
            --noconfirm `
            --clean `
            --windowed `
            --onefile `
            --name duplicate-finder `
            --hidden-import openpyxl `
            --hidden-import xlrd `
            --hidden-import odf `
            --hidden-import pandas `
            src/main.py

      - name: Préparer le zip Windows
        run: |
          New-Item -ItemType Directory -Force -Path release-windows\data, release-windows\output | Out-Null
          Copy-Item dist\duplicate-finder.exe release-windows\
          Copy-Item data\* release-windows\data\ -Recurse
          Copy-Item output\.gitkeep release-windows\output\.gitkeep
          Compress-Archive -Path release-windows\* -DestinationPath duplicate-finder-windows-${{ env.RELEASE_VERSION }}.zip

      - name: Upload artifact Windows
        uses: actions/upload-artifact@v4
        with:
          name: duplicate-finder-windows
          path: duplicate-finder-windows-${{ env.RELEASE_VERSION }}.zip

  # ─── Créer la Release GitHub ───────────────────────────────────
  release:
    needs: [prepare, build-linux, build-windows]
    runs-on: ubuntu-latest
    env:
      RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - name: Télécharger l'artifact Linux
        uses: actions/download-artifact@v4
        with:
          name: duplicate-finder-linux
          path: artifacts/linux

      - name: Télécharger l'artifact Windows
        uses: actions/download-artifact@v4
        with:
          name: duplicate-finder-windows
          path: artifacts/windows

      - name: Rendre le binaire Linux exécutable
        run: echo "permissions préservées dans le tar.gz"

      - name: Créer la Release GitHub
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_VERSION }}
          name: "Release ${{ env.RELEASE_VERSION }}"
          target_commitish: ${{ github.sha }}
          draft: false
          prerelease: false
          files: |
            artifacts/linux/duplicate-finder-linux-${{ env.RELEASE_VERSION }}.tar.gz
            artifacts/windows/duplicate-finder-windows-${{ env.RELEASE_VERSION }}.zip
